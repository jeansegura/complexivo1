name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: ecommerce_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Instalar PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo_pgsql, pgsql, mbstring, xml, curl, zip, dom, fileinfo
          coverage: none

      - name: Instalar dependencias de Composer
        run: composer install --prefer-dist --no-progress --no-interaction --optimize-autoloader

      - name: Preparar Laravel
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Verificar estilo de codigo con Pint
        run: ./vendor/bin/pint --test

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Instalar dependencias de Node
        run: npm ci

      - name: Compilar assets
        run: npm run build

      - name: Ejecutar pruebas
        run: php artisan test
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: ecommerce_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
